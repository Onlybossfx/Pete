<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Support — The Hunt for Gollum</title>
  
  <!-- Paystack Inline Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* (all existing styles stay exactly the same — no changes needed) */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(25, 45, 20, 0.4), rgba(25, 45, 20, 0.4)), url("bg.png");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      font-family: 'Playfair Display', serif;
      color: #c0c0c0;
      padding: 20px;
    }

    .donate-wrapper {
      max-width: 600px;
      margin: 40px auto;
      background: rgba(10, 45, 20, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid #b8860b;
      box-shadow: 0 0 60px rgba(184, 134, 11, 0.15);
      padding: 50px 40px;
    }

    .donate-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .donate-header .icon {
      font-size: 48px;
      color: #b8860b;
      margin-bottom: 10px;
    }

    .donate-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      background: linear-gradient(90deg, #8b4513, #b8860b, #d4af37, #b8860b, #8b4513);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .donate-header p {
      font-style: italic;
      color: #c0a080;
      font-size: 16px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #b8860b;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #d4af37;
    }

    .back-link i {
      margin-right: 8px;
    }

    .donate-form .form-group {
      margin-bottom: 18px;
    }

    .donate-form label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #daa520;
      display: block;
      margin-bottom: 4px;
    }

    .donate-form input,
    .donate-form textarea,
    .donate-form select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #c4a882;
      border-radius: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: #e0d0c0;
      transition: all 0.3s ease;
    }

    .donate-form input:focus,
    .donate-form textarea:focus,
    .donate-form select:focus {
      outline: none;
      border-color: #b8860b;
      box-shadow: 0 0 12px rgba(184, 134, 11, 0.15);
      background: rgba(255, 255, 255, 0.15);
    }

    .donate-form input::placeholder,
    .donate-form textarea::placeholder {
      color: #5a46064f;
      font-style: italic;
    }

    .donate-form select option {
      background: #1a0f08;
      color: #e0d0c0;
    }

    .currency-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .currency-row select {
      flex: 1;
    }

    .currency-symbol {
      font-size: 20px;
      color: #d4af37;
      min-width: 30px;
      text-align: center;
    }

    .amount-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 15px;
    }

    .amount-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid #c4a882;
      border-radius: 8px;
      color: #c0a080;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .amount-btn:hover {
      border-color: #b8860b;
      color: #d4af37;
      background: rgba(184, 134, 11, 0.1);
    }

    .amount-btn.selected {
      border-color: #b8860b;
      background: rgba(184, 134, 11, 0.15);
      color: #d4af37;
      box-shadow: 0 0 20px rgba(184, 134, 11, 0.1);
    }

    .custom-amount-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .custom-amount-row input {
      flex: 1;
    }

    .donate-btn {
      width: 100%;
      padding: 16px;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #8b4513, #b8860b);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .donate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(184, 134, 11, 0.35);
    }

    .donate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .donate-footer {
      text-align: center;
      margin-top: 24px;
      font-style: italic;
      color: #8b7355;
      font-size: 13px;
    }

    .donate-footer i {
      color: #b8860b;
    }

    .form-status {
      margin-top: 15px;
      padding: 12px 16px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .form-status.success {
      display: block;
      background: rgba(40, 167, 69, 0.15);
      border: 1px solid #28a745;
      color: #5cb85c;
    }

    .form-status.error {
      display: block;
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid #dc3545;
      color: #dc3545;
    }

    .form-status.info {
      display: block;
      background: rgba(184, 134, 11, 0.15);
      border: 1px solid #b8860b;
      color: #d4af37;
    }

    .detected-currency {
      text-align: center;
      font-size: 12px;
      color: #8b7355;
      margin-top: 5px;
      font-style: italic;
    }

    .detected-currency strong {
      color: #d4af37;
    }

    @media (max-width: 600px) {
      .donate-wrapper {
        padding: 30px 20px;
        margin: 20px auto;
      }

      .donate-header h1 {
        font-size: 22px;
      }

      .amount-btn {
        min-width: 60px;
        font-size: 12px;
        padding: 10px 12px;
      }

      .currency-row {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>

  <div class="donate-wrapper">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="donate-header">
      <div class="icon"><i class="fas fa-scroll"></i></div>
      <h1>Support the Journey</h1>
      <p>Every contribution brings Middle-earth closer to the screen</p>
    </div>

    <form class="donate-form" id="donateForm">
      <!-- Donor Name -->
      <div class="form-group">
        <label for="donorName"><i class="fas fa-user"></i> Your Name</label>
        <input type="text" id="donorName" name="name" placeholder="Enter your full name" required>
      </div>

      <!-- Donor Email -->
      <div class="form-group">
        <label for="donorEmail"><i class="fas fa-envelope"></i> Your Email</label>
        <input type="email" id="donorEmail" name="email" placeholder="Enter your email address" required>
      </div>

      <!-- Currency Selection (only supported currencies shown) -->
      <div class="form-group">
        <label><i class="fas fa-money-bill-wave"></i> Currency</label>
        <div class="currency-row">
          <select id="currencySelect">
            <!-- Options injected by JavaScript -->
          </select>
          <span class="currency-symbol" id="currencySymbol">₦</span>
        </div>
        <div class="detected-currency" id="detectedCurrency"></div>
      </div>

      <!-- Donation Amount -->
      <div class="form-group">
        <label><i class="fas fa-coins"></i> Choose Amount</label>
        <div class="amount-grid" id="amountGrid">
          <!-- Amount buttons generated by JS -->
        </div>
        <div class="custom-amount-row">
          <input type="number" id="customAmount" name="customAmount" placeholder="Custom amount" min="1">
        </div>
      </div>

      <!-- Message (optional) -->
      <div class="form-group">
        <label for="donorMessage"><i class="fas fa-comment"></i> Message (optional)</label>
        <textarea id="donorMessage" name="message" rows="3" placeholder="Leave a message for the team..."></textarea>
      </div>

      <button type="submit" class="donate-btn" id="donateSubmitBtn">
        <i class="fas fa-heart"></i> Contribute Now
      </button>

      <div class="form-status" id="formStatus"></div>
    </form>

    <div class="donate-footer">
      <i class="fas fa-feather-alt"></i> All contributions go directly to production costs
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ============================================================
      // 👇 CONFIGURE YOUR PAYSTACK SETTINGS HERE 👇
      // ============================================================

      // 1. Your single Paystack API key (test or live)
      const PAYSTACK_KEY = 'pk_live_a292116859a7fc29c7ed46c9b9e112ec5308a7e6';

      // 2. Which currencies does your merchant account support?
      //    Expand this list to include ALL currencies you want to accept globally.
      const SUPPORTED_CURRENCIES = [
        // Africa
        'NGN', 'GHS', 'KES', 'ZAR',
        // Americas
        'USD', 'CAD', 'MXN',
        // Europe
        'EUR', 'GBP', 'CHF', 'SEK', 'NOK', 'DKK', 'PLN', 'CZK', 'HUF',
        // Oceania
        'AUD', 'NZD'
      ];

      // 3. Preset amounts for each currency
      const AMOUNT_PRESETS = {
        NGN: [1000, 2500, 5000, 10000, 25000],
        GHS: [50, 100, 200, 500, 1000],
        KES: [500, 1000, 2000, 5000, 10000],
        ZAR: [50, 100, 200, 500, 1000],
        USD: [5, 10, 20, 50, 100],
        EUR: [5, 10, 20, 50, 100],
        GBP: [5, 10, 20, 50, 100],
        CAD: [5, 10, 20, 50, 100],
        AUD: [5, 10, 20, 50, 100],
        NZD: [5, 10, 20, 50, 100],
        CHF: [5, 10, 20, 50, 100],
        SEK: [50, 100, 200, 500, 1000],
        NOK: [50, 100, 200, 500, 1000],
        DKK: [50, 100, 200, 500, 1000],
        PLN: [20, 50, 100, 200, 500],
        CZK: [100, 200, 500, 1000, 2000],
        HUF: [1000, 2000, 5000, 10000, 20000],
        MXN: [100, 200, 500, 1000, 2000]
      };

      // 4. Minimum amount per currency
      const MIN_AMOUNT = {
        NGN: 100,
        GHS: 10,
        KES: 100,
        ZAR: 10,
        USD: 1,
        EUR: 1,
        GBP: 1,
        CAD: 1,
        AUD: 1,
        NZD: 1,
        CHF: 1,
        SEK: 10,
        NOK: 10,
        DKK: 10,
        PLN: 5,
        CZK: 50,
        HUF: 500,
        MXN: 50
      };

      // Currency display info
      const CURRENCY_INFO = {
        NGN: { symbol: '₦', label: 'Nigerian Naira' },
        GHS: { symbol: '₵', label: 'Ghanaian Cedi' },
        KES: { symbol: 'KSh', label: 'Kenyan Shilling' },
        ZAR: { symbol: 'R', label: 'South African Rand' },
        USD: { symbol: '$', label: 'US Dollar' },
        EUR: { symbol: '€', label: 'Euro' },
        GBP: { symbol: '£', label: 'British Pound' },
        CAD: { symbol: 'C$', label: 'Canadian Dollar' },
        AUD: { symbol: 'A$', label: 'Australian Dollar' },
        NZD: { symbol: 'NZ$', label: 'New Zealand Dollar' },
        CHF: { symbol: 'Fr', label: 'Swiss Franc' },
        SEK: { symbol: 'kr', label: 'Swedish Krona' },
        NOK: { symbol: 'kr', label: 'Norwegian Krone' },
        DKK: { symbol: 'kr', label: 'Danish Krone' },
        PLN: { symbol: 'zł', label: 'Polish Złoty' },
        CZK: { symbol: 'Kč', label: 'Czech Koruna' },
        HUF: { symbol: 'Ft', label: 'Hungarian Forint' },
        MXN: { symbol: 'Mex$', label: 'Mexican Peso' }
      };

      // ============================================================
      // END OF CONFIGURATION
      // ============================================================

      // DOM refs
      const form = document.getElementById('donateForm');
      const nameInput = document.getElementById('donorName');
      const emailInput = document.getElementById('donorEmail');
      const currencySelect = document.getElementById('currencySelect');
      const currencySymbol = document.getElementById('currencySymbol');
      const amountGrid = document.getElementById('amountGrid');
      const customInput = document.getElementById('customAmount');
      const statusDiv = document.getElementById('formStatus');
      const submitBtn = document.getElementById('donateSubmitBtn');
      const detectedCurrencyDiv = document.getElementById('detectedCurrency');

      let selectedAmount = null;
      let currentCurrency = SUPPORTED_CURRENCIES[0] || 'NGN';

      // ============================================
      // DETECT USER CURRENCY — GLOBAL COVERAGE
      // ============================================
      function detectUserCurrency() {
        try {
          const locale = navigator.language || navigator.languages?.[0] || 'en-US';
          
          // Comprehensive country → currency mapping
          const countryMap = {
            // Africa
            'NG': 'NGN', 'GH': 'GHS', 'KE': 'KES', 'ZA': 'ZAR',
            'UG': 'KES', 'TZ': 'KES', 'RW': 'KES',
            // Americas
            'US': 'USD', 'CA': 'CAD', 'MX': 'MXN',
            // Europe
            'GB': 'GBP', 'FR': 'EUR', 'DE': 'EUR', 'ES': 'EUR',
            'IT': 'EUR', 'NL': 'EUR', 'BE': 'EUR', 'PT': 'EUR',
            'CH': 'CHF', 'SE': 'SEK', 'NO': 'NOK', 'DK': 'DKK',
            'PL': 'PLN', 'CZ': 'CZK', 'HU': 'HUF', 'AT': 'EUR',
            'IE': 'EUR', 'FI': 'EUR', 'GR': 'EUR', 'LU': 'EUR',
            'HR': 'EUR', 'BG': 'BGN', 'RO': 'RON', 'IS': 'ISK',
            // Oceania
            'AU': 'AUD', 'NZ': 'NZD',
            // Asia
            'SG': 'USD', 'JP': 'JPY', 'CN': 'CNY', 'IN': 'INR',
            'KR': 'KRW', 'ID': 'IDR', 'MY': 'MYR', 'PH': 'PHP',
            'TH': 'THB', 'VN': 'VND', 'PK': 'PKR', 'BD': 'BDT'
          };

          const parts = locale.split('-');
          const country = parts.length > 1 ? parts[1].toUpperCase() : null;
          
          if (country && countryMap[country]) {
            const detected = countryMap[country];
            if (SUPPORTED_CURRENCIES.includes(detected)) {
              return detected;
            }
          }

          // Fallback: try Intl.NumberFormat
          try {
            const formatter = new Intl.NumberFormat(navigator.language, { style: 'currency', currency: 'USD' });
            const parts = formatter.formatToParts(0);
            const currencyPart = parts.find(p => p.type === 'currency');
            if (currencyPart && currencyPart.value) {
              const detected = currencyPart.value;
              if (SUPPORTED_CURRENCIES.includes(detected)) {
                return detected;
              }
            }
          } catch (e) {}

        } catch (e) {}
        
        // Final fallback
        return SUPPORTED_CURRENCIES[0] || 'NGN';
      }

      // ============================================
      // POPULATE CURRENCY DROPDOWN
      // ============================================
      function populateCurrencyDropdown() {
        currencySelect.innerHTML = '';
        SUPPORTED_CURRENCIES.forEach(code => {
          const info = CURRENCY_INFO[code];
          if (!info) return;
          const opt = document.createElement('option');
          opt.value = code;
          opt.textContent = `${info.symbol} ${code} — ${info.label}`;
          currencySelect.appendChild(opt);
        });
        if (currencySelect.options.length === 0) {
          const opt = document.createElement('option');
          opt.value = 'NGN';
          opt.textContent = '₦ NGN — Nigerian Naira';
          currencySelect.appendChild(opt);
        }
      }

      // ============================================
      // UPDATE UI FOR SELECTED CURRENCY
      // ============================================
      function updateUI(currencyCode) {
        const info = CURRENCY_INFO[currencyCode];
        if (!info) return;
        currencySymbol.textContent = info.symbol;
        customInput.placeholder = `Custom amount (${info.symbol})`;

        const presets = AMOUNT_PRESETS[currencyCode] || [100, 200, 500, 1000];
        amountGrid.innerHTML = '';
        presets.forEach(amount => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'amount-btn';
          btn.dataset.amount = amount;
          btn.textContent = `${info.symbol}${amount.toLocaleString()}`;
          btn.addEventListener('click', function() {
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedAmount = parseInt(this.dataset.amount);
            customInput.value = '';
          });
          amountGrid.appendChild(btn);
        });

        document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
        selectedAmount = null;
        customInput.value = '';
        statusDiv.style.display = 'none';
        statusDiv.className = 'form-status';
      }

      // ============================================
      // HANDLE CURRENCY CHANGE
      // ============================================
      function handleCurrencyChange(currencyCode) {
        currentCurrency = currencyCode;
        updateUI(currencyCode);
        const info = CURRENCY_INFO[currencyCode];
        detectedCurrencyDiv.innerHTML = `🌍 Using: <strong>${info.symbol} ${currencyCode}</strong> — ${info.label}`;
      }

      // ============================================
      // SET DEFAULT CURRENCY
      // ============================================
      function setDefaultCurrency() {
        const detected = detectUserCurrency();
        const options = Array.from(currencySelect.options).map(o => o.value);
        let defaultCurrency = options.includes(detected) ? detected : options[0] || 'NGN';
        currencySelect.value = defaultCurrency;
        handleCurrencyChange(defaultCurrency);
      }

      // ============================================
      // CUSTOM AMOUNT HANDLING
      // ============================================
      customInput.addEventListener('input', function() {
        if (this.value) {
          document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
          selectedAmount = null;
        }
      });

      // ============================================
      // FORM SUBMISSION
      // ============================================
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const currency = currencySelect.value;
        const minAmt = MIN_AMOUNT[currency] || 1;
        const customValue = parseInt(customInput.value);
        let amount = selectedAmount || customValue;

        if (!name) {
          showStatus('Please enter your name.', 'error');
          return;
        }
        if (!email || !email.includes('@')) {
          showStatus('Please enter a valid email address.', 'error');
          return;
        }
        if (!amount || amount < minAmt) {
          showStatus(`Minimum amount is ${CURRENCY_INFO[currency].symbol}${minAmt}.`, 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';

        try {
          if (typeof PaystackPop === 'undefined') {
            showStatus('Payment system is loading. Please try again in a moment.', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-heart"></i> Contribute Now';
            return;
          }

          const handler = PaystackPop.setup({
            key: PAYSTACK_KEY,
            email: email,
            amount: amount * 100,
            currency: currency,
            metadata: {
              custom_fields: [
                { display_name: "Donor Name", variable_name: "donor_name", value: name },
                { display_name: "Currency", variable_name: "currency", value: currency }
              ]
            },
            callback: function(response) {
              showStatus(`Thank you ${name}! Your contribution of ${CURRENCY_INFO[currency].symbol}${amount.toLocaleString()} has been received.`, 'success');
              submitBtn.disabled = false;
              submitBtn.innerHTML = '<i class="fas fa-heart"></i> Contribute Now';
              form.reset();
              document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
              selectedAmount = null;
              setDefaultCurrency();
              console.log('Payment successful:', response);
            },
            onClose: function() {
              showStatus('Payment was cancelled. You can try again anytime.', 'error');
              submitBtn.disabled = false;
              submitBtn.innerHTML = '<i class="fas fa-heart"></i> Contribute Now';
            }
          });

          handler.openIframe();

        } catch (error) {
          console.error('Payment error:', error);
          showStatus('Something went wrong. Please try again.', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-heart"></i> Contribute Now';
        }
      });

      function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = 'form-status ' + type;
        statusDiv.style.display = 'block';
        if (type === 'success') {
          setTimeout(() => { statusDiv.style.display = 'none'; }, 8000);
        }
      }

      // ============================================
      // INIT
      // ============================================
      populateCurrencyDropdown();
      setDefaultCurrency();

      currencySelect.addEventListener('change', function() {
        handleCurrencyChange(this.value);
      });

      console.log('🌍 Donate page ready. Supported currencies:', SUPPORTED_CURRENCIES);
    })();
  </script>

</body>
</html>
