<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Invest — The Hunt for Gollum</title>
  
  <!-- Paystack Inline Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* ============================================
       INVESTOR PAYMENT PAGE STYLES
    ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(25, 45, 20, 0.5), rgba(25, 45, 20, 0.5)), url("bg.png");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      font-family: 'Playfair Display', serif;
      color: #c0c0c0;
      padding: 20px;
    }

    .investor-wrapper {
      max-width: 680px;
      margin: 40px auto;
      background: rgba(10, 45, 20, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid #b8860b;
      box-shadow: 0 0 60px rgba(184, 134, 11, 0.15);
      padding: 50px 40px;
    }

    .investor-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .investor-header .icon {
      font-size: 48px;
      color: #b8860b;
      margin-bottom: 10px;
    }

    .investor-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      background: linear-gradient(90deg, #8b4513, #b8860b, #d4af37, #b8860b, #8b4513);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .investor-header p {
      font-style: italic;
      color: #c0a080;
      font-size: 16px;
    }

    .investor-form .form-group {
      margin-bottom: 18px;
    }

    .investor-form label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #daa520;
      display: block;
      margin-bottom: 4px;
    }

    .investor-form input,
    .investor-form textarea,
    .investor-form select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #c4a882;
      border-radius: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: #e0d0c0;
      transition: all 0.3s ease;
    }

    .investor-form input:focus,
    .investor-form textarea:focus,
    .investor-form select:focus {
      outline: none;
      border-color: #b8860b;
      box-shadow: 0 0 12px rgba(184, 134, 11, 0.15);
      background: rgba(255, 255, 255, 0.15);
    }

    .investor-form input::placeholder,
    .investor-form textarea::placeholder {
      color: #5a46064f;
      font-style: italic;
    }

    .investor-form select option {
      background: #1a0f08;
      color: #e0d0c0;
    }

    .currency-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .currency-row select {
      flex: 1;
    }

    .currency-symbol {
      font-size: 20px;
      color: #d4af37;
      min-width: 30px;
      text-align: center;
    }

    .amount-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 15px;
    }

    .amount-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid #c4a882;
      border-radius: 8px;
      color: #c0a080;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .amount-btn:hover {
      border-color: #b8860b;
      color: #d4af37;
      background: rgba(184, 134, 11, 0.1);
    }

    .amount-btn.selected {
      border-color: #b8860b;
      background: rgba(184, 134, 11, 0.15);
      color: #d4af37;
      box-shadow: 0 0 20px rgba(184, 134, 11, 0.1);
    }

    .custom-amount-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .custom-amount-row input {
      flex: 1;
    }

    .investor-btn {
      width: 100%;
      padding: 16px;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #8b4513, #b8860b);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .investor-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(184, 134, 11, 0.35);
    }

    .investor-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .investor-footer {
      text-align: center;
      margin-top: 24px;
      font-style: italic;
      color: #8b7355;
      font-size: 13px;
    }

    .investor-footer i {
      color: #b8860b;
    }

    .form-status {
      margin-top: 15px;
      padding: 12px 16px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .form-status.success {
      display: block;
      background: rgba(40, 167, 69, 0.15);
      border: 1px solid #28a745;
      color: #5cb85c;
    }

    .form-status.error {
      display: block;
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid #dc3545;
      color: #dc3545;
    }

    .form-status.info {
      display: block;
      background: rgba(184, 134, 11, 0.15);
      border: 1px solid #b8860b;
      color: #d4af37;
    }

    .detected-currency {
      text-align: center;
      font-size: 12px;
      color: #8b7355;
      margin-top: 5px;
      font-style: italic;
    }

    .detected-currency strong {
      color: #d4af37;
    }

    @media (max-width: 600px) {
      .investor-wrapper {
        padding: 30px 20px;
        margin: 20px auto;
      }

      .investor-header h1 {
        font-size: 22px;
      }

      .amount-btn {
        min-width: 60px;
        font-size: 12px;
        padding: 10px 12px;
      }

      .currency-row {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>

  <div class="investor-wrapper">
    <div class="investor-header">
      <div class="icon"><i class="fas fa-handshake"></i></div>
      <h1>Invest in The Hunt for Gollum</h1>
      <p>Secure your stake in this epic journey</p>
    </div>

    <form class="investor-form" id="investorForm">
      <!-- Full Name -->
      <div class="form-group">
        <label for="investorName"><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="investorName" name="name" placeholder="Enter your full name" required>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="investorEmail"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="investorEmail" name="email" placeholder="Enter your email address" required>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="investorPhone"><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" id="investorPhone" name="phone" placeholder="Enter your phone number (optional)">
      </div>

      <!-- Company / Organization -->
      <div class="form-group">
        <label for="investorCompany"><i class="fas fa-building"></i> Company / Organization</label>
        <input type="text" id="investorCompany" name="company" placeholder="Enter your company name (optional)">
      </div>

      <!-- Currency Selection (only supported currencies) -->
      <div class="form-group">
        <label><i class="fas fa-money-bill-wave"></i> Currency</label>
        <div class="currency-row">
          <select id="currencySelect">
            <!-- Injected by JS -->
          </select>
          <span class="currency-symbol" id="currencySymbol">$</span>
        </div>
        <div class="detected-currency" id="detectedCurrency"></div>
      </div>

      <!-- Investment Amount -->
      <div class="form-group">
        <label><i class="fas fa-coins"></i> Investment Amount</label>
        <div class="amount-grid" id="amountGrid">
          <!-- Amount buttons generated by JS -->
        </div>
        <div class="custom-amount-row">
          <input type="number" id="customAmount" name="customAmount" placeholder="Custom amount" min="1">
        </div>
      </div>

      <!-- Additional Message -->
      <div class="form-group">
        <label for="investorMessage"><i class="fas fa-comment"></i> Message / Notes (optional)</label>
        <textarea id="investorMessage" name="message" rows="3" placeholder="Any additional information for the production team..."></textarea>
      </div>

      <button type="submit" class="investor-btn" id="investorSubmitBtn">
        <i class="fas fa-handshake"></i> Invest Now
      </button>

      <div class="form-status" id="formStatus"></div>
    </form>

    <div class="investor-footer">
      <i class="fas fa-feather-alt"></i> All investment funds go directly to production costs. We'll send you a confirmation and investment agreement via email.
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ============================================================
      // 👇 CONFIGURE YOUR PAYSTACK SETTINGS HERE 👇
      // ============================================================

      const PAYSTACK_KEY = 'pk_live_a292116859a7fc29c7ed46c9b9e112ec5308a7e6'; // ← Replace with your key
      const SUPPORTED_CURRENCIES = ['NGN', 'GHS', 'KES', 'ZAR']; // ← Edit this list

      // Preset amounts for each currency (investor-specific)
      const AMOUNT_PRESETS = {
        NGN: [50000, 100000, 250000, 500000, 1000000],
        GHS: [1000, 2500, 5000, 10000, 25000],
        KES: [10000, 25000, 50000, 100000, 250000],
        ZAR: [1000, 2500, 5000, 10000, 25000],
        USD: [5000, 10000, 25000, 50000, 100000],
        EUR: [5000, 10000, 25000, 50000, 100000],
        GBP: [5000, 10000, 25000, 50000, 100000]
      };

      const MIN_AMOUNT = {
        NGN: 1000,
        GHS: 100,
        KES: 1000,
        ZAR: 100,
        USD: 100,
        EUR: 100,
        GBP: 100
      };

      const CURRENCY_INFO = {
        NGN: { symbol: '₦', label: 'Nigerian Naira' },
        GHS: { symbol: '₵', label: 'Ghanaian Cedi' },
        KES: { symbol: 'KSh', label: 'Kenyan Shilling' },
        ZAR: { symbol: 'R', label: 'South African Rand' },
        USD: { symbol: '$', label: 'US Dollar' },
        EUR: { symbol: '€', label: 'Euro' },
        GBP: { symbol: '£', label: 'British Pound' }
      };

      // ============================================================
      // END OF CONFIGURATION
      // ============================================================

      // DOM refs
      const form = document.getElementById('investorForm');
      const nameInput = document.getElementById('investorName');
      const emailInput = document.getElementById('investorEmail');
      const phoneInput = document.getElementById('investorPhone');
      const companyInput = document.getElementById('investorCompany');
      const messageInput = document.getElementById('investorMessage');
      const currencySelect = document.getElementById('currencySelect');
      const currencySymbol = document.getElementById('currencySymbol');
      const amountGrid = document.getElementById('amountGrid');
      const customInput = document.getElementById('customAmount');
      const statusDiv = document.getElementById('formStatus');
      const submitBtn = document.getElementById('investorSubmitBtn');
      const detectedCurrencyDiv = document.getElementById('detectedCurrency');

      let selectedAmount = null;
      let currentCurrency = SUPPORTED_CURRENCIES[0] || 'NGN';

      // ============================================
      // DETECT USER CURRENCY
      // ============================================
      function detectUserCurrency() {
        try {
          const locale = navigator.language || navigator.languages?.[0] || 'en-US';
          const countryMap = {
            'NG': 'NGN', 'GH': 'GHS', 'KE': 'KES', 'ZA': 'ZAR',
            'US': 'USD', 'GB': 'GBP', 'FR': 'EUR', 'DE': 'EUR',
            'ES': 'EUR', 'IT': 'EUR', 'CA': 'USD'
          };
          const parts = locale.split('-');
          const country = parts.length > 1 ? parts[1].toUpperCase() : null;
          if (country && countryMap[country]) {
            const detected = countryMap[country];
            if (SUPPORTED_CURRENCIES.includes(detected)) {
              return detected;
            }
          }
        } catch (e) {}
        return SUPPORTED_CURRENCIES[0] || 'NGN';
      }

      // ============================================
      // POPULATE CURRENCY DROPDOWN
      // ============================================
      function populateCurrencyDropdown() {
        currencySelect.innerHTML = '';
        SUPPORTED_CURRENCIES.forEach(code => {
          const info = CURRENCY_INFO[code];
          if (!info) return;
          const opt = document.createElement('option');
          opt.value = code;
          opt.textContent = `${info.symbol} ${code} — ${info.label}`;
          currencySelect.appendChild(opt);
        });
        if (currencySelect.options.length === 0) {
          const opt = document.createElement('option');
          opt.value = 'NGN';
          opt.textContent = '₦ NGN — Nigerian Naira';
          currencySelect.appendChild(opt);
        }
      }

      // ============================================
      // UPDATE UI FOR SELECTED CURRENCY
      // ============================================
      function updateUI(currencyCode) {
        const info = CURRENCY_INFO[currencyCode];
        if (!info) return;
        currencySymbol.textContent = info.symbol;
        customInput.placeholder = `Custom amount (${info.symbol})`;

        const presets = AMOUNT_PRESETS[currencyCode] || [100, 200, 500, 1000];
        amountGrid.innerHTML = '';
        presets.forEach(amount => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'amount-btn';
          btn.dataset.amount = amount;
          btn.textContent = `${info.symbol}${amount.toLocaleString()}`;
          btn.addEventListener('click', function() {
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedAmount = parseInt(this.dataset.amount);
            customInput.value = '';
          });
          amountGrid.appendChild(btn);
        });

        document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
        selectedAmount = null;
        customInput.value = '';
        statusDiv.style.display = 'none';
        statusDiv.className = 'form-status';
      }

      // ============================================
      // HANDLE CURRENCY CHANGE
      // ============================================
      function handleCurrencyChange(currencyCode) {
        currentCurrency = currencyCode;
        updateUI(currencyCode);
        const info = CURRENCY_INFO[currencyCode];
        detectedCurrencyDiv.innerHTML = `🌍 Using: <strong>${info.symbol} ${currencyCode}</strong> — ${info.label}`;
      }

      // ============================================
      // SET DEFAULT CURRENCY
      // ============================================
      function setDefaultCurrency() {
        const detected = detectUserCurrency();
        const options = Array.from(currencySelect.options).map(o => o.value);
        let defaultCurrency = options.includes(detected) ? detected : options[0] || 'NGN';
        currencySelect.value = defaultCurrency;
        handleCurrencyChange(defaultCurrency);
      }

      // ============================================
      // CUSTOM AMOUNT HANDLING
      // ============================================
      customInput.addEventListener('input', function() {
        if (this.value) {
          document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
          selectedAmount = null;
        }
      });

      // ============================================
      // FORM SUBMISSION
      // ============================================
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const phone = phoneInput.value.trim();
        const company = companyInput.value.trim();
        const message = messageInput.value.trim();
        const currency = currencySelect.value;
        const minAmt = MIN_AMOUNT[currency] || 1;
        const customValue = parseInt(customInput.value);
        let amount = selectedAmount || customValue;

        // Validation
        if (!name) {
          showStatus('Please enter your full name.', 'error');
          return;
        }
        if (!email || !email.includes('@')) {
          showStatus('Please enter a valid email address.', 'error');
          return;
        }
        if (!amount || amount < minAmt) {
          showStatus(`Minimum investment is ${CURRENCY_INFO[currency].symbol}${minAmt}.`, 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';

        try {
          if (typeof PaystackPop === 'undefined') {
            showStatus('Payment system is loading. Please try again in a moment.', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-handshake"></i> Invest Now';
            return;
          }

          const handler = PaystackPop.setup({
            key: PAYSTACK_KEY,
            email: email,
            amount: amount * 100,
            currency: currency,
            metadata: {
              custom_fields: [
                { display_name: "Investor Name", variable_name: "investor_name", value: name },
                { display_name: "Phone", variable_name: "phone", value: phone || 'N/A' },
                { display_name: "Company", variable_name: "company", value: company || 'N/A' },
                { display_name: "Message", variable_name: "message", value: message || 'N/A' },
                { display_name: "Currency", variable_name: "currency", value: currency }
              ]
            },
            callback: function(response) {
              // Payment successful — save to localStorage
              const investment = {
                id: Date.now(),
                name: name,
                email: email,
                phone: phone || 'N/A',
                company: company || 'N/A',
                amount: amount,
                currency: currency,
                message: message || 'N/A',
                transactionRef: response.reference,
                submitted: new Date().toISOString()
              };
              const investments = JSON.parse(localStorage.getItem('investments') || '[]');
              investments.push(investment);
              localStorage.setItem('investments', JSON.stringify(investments));

              showStatus(
                `Thank you ${name}! Your investment of ${CURRENCY_INFO[currency].symbol}${amount.toLocaleString()} has been confirmed. We'll send you a formal agreement shortly.`,
                'success'
              );
              submitBtn.disabled = false;
              submitBtn.innerHTML = '<i class="fas fa-handshake"></i> Invest Now';
              form.reset();
              document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
              selectedAmount = null;
              setDefaultCurrency();
              console.log('Investment successful:', response);
            },
            onClose: function() {
              showStatus('Payment was cancelled. You can try again anytime.', 'error');
              submitBtn.disabled = false;
              submitBtn.innerHTML = '<i class="fas fa-handshake"></i> Invest Now';
            }
          });

          handler.openIframe();

        } catch (error) {
          console.error('Payment error:', error);
          showStatus('Something went wrong. Please try again.', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-handshake"></i> Invest Now';
        }
      });

      function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = 'form-status ' + type;
        statusDiv.style.display = 'block';
        if (type === 'success') {
          setTimeout(() => { statusDiv.style.display = 'none'; }, 12000);
        }
      }

      // ============================================
      // INIT
      // ============================================
      populateCurrencyDropdown();
      setDefaultCurrency();
      currencySelect.addEventListener('change', function() {
        handleCurrencyChange(this.value);
      });

      console.log('📈 Investor payment page ready.');
    })();
  </script>
</body>
</html>
